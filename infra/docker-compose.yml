# Docker Compose - Entorno Gestión de Datos IA

version: '3.8'

services:
  # Servicio de Aplicación (Python + GCloud SDK)
  app:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    container_name: london_crime_app
    volumes:
      - ..:/app
      # Montaje opcional para credenciales locales de GCP si se desea
      - ~/.config/gcloud:/root/.config/gcloud 
    environment:
      - PYTHONUNBUFFERED=1
    tty: true
    stdin_open: true

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    container_name: datagestor-frontend
    ports:
      - "5173:80"
    env_file:
      - ../apps/frontend/.env.local
    restart: unless-stopped
