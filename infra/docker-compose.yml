# Docker Compose - Entorno Gestión de Datos IA

version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.9-slim}
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${BACKEND_CONTAINER_NAME:-london_crime_app}
    volumes:
      - ..:/app
      - ~/.config/gcloud:/root/.config/gcloud
    environment:
      - PYTHONUNBUFFERED=1
    tty: true
    stdin_open: true

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:alpine}
        NGINX_PORT: ${NGINX_PORT:-80}
    container_name: ${FRONTEND_CONTAINER_NAME:-datagestor-frontend}
    ports:
      - "${FRONTEND_PORT:-5173}:${NGINX_PORT:-80}"
    env_file:
      - ../apps/frontend/.env.local
    restart: unless-stopped
