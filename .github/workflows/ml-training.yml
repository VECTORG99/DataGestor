name: ML Training

on:
  schedule:
    - cron: '0 6 3 * *'   # every 3 days at 06:00 UTC
  workflow_dispatch:

jobs:
  train:
    name: Train & release models
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train ML models
        run: python apps/backend/cli/ml_pipeline.py
      - name: Commit updated ML metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/frontend/public/ml/ml_metrics.json
          git diff --cached --quiet || git commit -m "chore: update ML metrics [skip ci]"
          git stash --include-untracked || true
          git pull --rebase origin master
          git push origin HEAD:master
      - name: Upload models as release artifacts
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          tag: ml-models-latest
          name: "ML Models (latest)"
          artifacts: data/models/*.joblib
          token: ${{ secrets.GITHUB_TOKEN }}
